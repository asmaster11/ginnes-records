<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Ginnes Jahon Rekordlari Ensiklopediyasi</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background 1s ease;
            color: #f3f4f6;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .font-tech { font-family: 'Space Grotesk', sans-serif; }
        
        /* 21-asr Minimalist Shisha Paneli */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        /* Hover va interaktiv harakatlar */
        .neon-hover {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .neon-hover:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 25px var(--accent-glow);
            border-color: var(--accent-color);
        }

        /* Skanerlash chizig'i effekti (Rasm ustida) */
        .scanline::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Dinamik Karaoke Subtitrlari uchun */
        .word-span {
            display: inline-block;
            margin-right: 6px;
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.4);
        }
        .word-active {
            color: #fbbf24 !important;
            text-shadow: 0 0 12px rgba(251, 191, 36, 0.8);
            transform: scale(1.1);
        }

        /* Zarrachalar (Particles) foni */
        #particles-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Animatsiyalar */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-modern-modal {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="flex flex-col justify-between selection:bg-amber-600 selection:text-white relative">

    <!-- Dinamik Zarrachalar foni (Qor, xazon, quyosh nurlari) -->
    <canvas id="particles-canvas"></canvas>

    <!-- HEADER -->
    <header class="pt-16 pb-8 px-4 text-center relative z-10">
        <div id="season-badge" class="inline-block px-4 py-1 mb-4 rounded-full glass-panel text-xs tracking-widest uppercase font-semibold transition-all duration-1000">
            YUKLANMOQDA...
        </div>
        <h1 class="text-4xl md:text-6xl font-black font-tech tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-200 to-gray-500">
            GWR CHRONICLES
        </h1>
        <p class="text-gray-400 mt-3 max-w-xl mx-auto text-xs md:text-sm font-light uppercase tracking-widest">
            Koinot va Yer yuzidagi eng aqlbovar qilmas rekordlar kutubxonasi
        </p>
    </header>

    <!-- ASOSIY APARAT -->
    <main class="max-w-6xl mx-auto px-4 py-4 w-full flex-grow z-10">
        
        <!-- KATTA KUN REKORDI KARTASI -->
        <div class="glass-panel rounded-3xl p-1 mb-12 border border-white/10">
            <div class="bg-black/20 rounded-[22px] p-6 md:p-8 flex flex-col md:flex-row items-center gap-6">
                <div class="w-full md:w-1/3 h-52 rounded-2xl overflow-hidden relative shadow-2xl border border-white/10 scanline group">
                    <img id="today-img" src="" alt="Bugungi rekord" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    <div class="absolute top-3 left-3 bg-white/10 backdrop-blur-md text-white border border-white/20 px-3 py-1 rounded-full text-[9px] font-bold tracking-widest uppercase">
                        BUGUNGI KASHFIYOT
                    </div>
                </div>
                <div class="w-full md:w-2/3 text-center md:text-left">
                    <span id="today-date-badge" class="text-xs font-tech text-gray-400 tracking-widest uppercase font-semibold">15-IYUL</span>
                    <h2 id="today-title" class="text-2xl md:text-3xl font-extrabold mt-1 mb-3 text-white tracking-tight">Yuklanmoqda...</h2>
                    <p id="today-desc" class="text-gray-400 text-sm leading-relaxed font-light">
                        ...
                    </p>
                </div>
            </div>
        </div>

        <!-- OYLAR NAVIGATSIYASI -->
        <div id="months-container" class="flex flex-wrap justify-center gap-2 mb-10 pb-6 border-b border-white/5">
            <!-- Dinamik oylar -->
        </div>

        <!-- SEZON SArLAVHASI -->
        <div class="text-center mb-10">
            <h3 id="selected-month-title" class="text-3xl md:text-4xl font-tech font-bold text-white tracking-tight capitalize">
                Yanvar Oyi
            </h3>
            <p class="text-[10px] text-gray-500 mt-1 tracking-widest uppercase">Faslga xos interaktiv muhit va rekordlar olami</p>
        </div>

        <!-- KUNLAR SETKASI (GRID) -->
        <div id="days-grid" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 gap-3">
            <!-- Dinamik kunlar -->
        </div>

    </main>

    <!-- ZAMONAVIY 3D DETALLI MODAL OYNASI (KAROKE SUBTITRLI) -->
    <div id="record-modal" class="fixed inset-0 bg-black/85 backdrop-blur-xl z-50 hidden flex items-center justify-center p-4">
        <div id="modal-content" class="glass-panel border border-white/15 p-6 rounded-3xl max-w-lg w-full relative shadow-[0_0_80px_rgba(255,255,255,0.05)] animate-modern-modal">
            
            <!-- Yopish tugmasi -->
            <button onclick="closeModal()" class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/5 border border-white/10 text-gray-400 hover:text-white flex items-center justify-center text-xl transition-all duration-300 hover:scale-110">&times;</button>
            
            <!-- Rasm va Visual Skanerlash -->
            <div class="relative h-56 -mx-6 -mt-6 mb-6 overflow-hidden border-b border-white/10 scanline">
                <img id="modal-img" src="" alt="Rekord" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent"></div>
                <span id="modal-date" class="absolute bottom-4 left-6 font-tech text-xs px-3 py-1 rounded-full bg-white/10 border border-white/20 text-white font-bold tracking-wider uppercase">
                    1-YANVAR
                </span>
            </div>

            <!-- Sarlavha -->
            <h4 id="modal-title" class="text-2xl font-black text-white mb-4 leading-snug tracking-tight"></h4>
            
            <!-- Subtitr o'qiluvchi karoke hududi -->
            <div id="subtitles-area" class="text-gray-300 text-base leading-relaxed font-normal min-h-[90px] mb-6 p-4 rounded-2xl bg-black/30 border border-white/5">
                <!-- So'zlar bu yerda dinamik ravishda bittadan o'qiladi -->
            </div>

            <div class="flex items-center justify-between border-t border-white/10 pt-4 text-[10px] text-gray-500 font-tech tracking-widest">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span>ONLINE CHRONICLE</span>
                </div>
                <button onclick="toggleSpeech()" id="audio-btn" class="px-3 py-1 rounded-md bg-white/5 border border-white/10 text-amber-400 hover:bg-amber-400 hover:text-black transition">
                    🔊 Qayta eshitish
                </button>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="py-8 text-center text-gray-600 text-[10px] border-t border-white/5 font-tech tracking-widest">
        <p>GWR SYSTEM &bull; 21ST CENTURY EDITION</p>
    </footer>

    <!-- JAVASCRIPT VA INTEGRAL INTERAKTIV TIZIM -->
    <script>
        const months = [
            { id: 'yanvar', name: 'Yanvar', days: 31, season: 'winter' },
            { id: 'fevral', name: 'Fevral', days: 29, season: 'winter' },
            { id: 'mart', name: 'Mart', days: 31, season: 'spring' },
            { id: 'aprel', name: 'Aprel', days: 30, season: 'spring' },
            { id: 'may', name: 'May', days: 31, season: 'spring' },
            { id: 'iyun', name: 'Iyun', days: 30, season: 'summer' },
            { id: 'iyul', name: 'Iyul', days: 31, season: 'summer' },
            { id: 'avgust', name: 'Avgust', days: 31, season: 'summer' },
            { id: 'sentabr', name: 'Sentabr', days: 30, season: 'autumn' },
            { id: 'oktabr', name: 'Oktabr', days: 31, season: 'autumn' },
            { id: 'noyabr', name: 'Noyabr', days: 30, season: 'autumn' },
            { id: 'dekabr', name: 'Dekabr', days: 31, season: 'winter' }
        ];

        // Sezonlar bo'yicha visual muhit sozlamalari
        const seasonalStyles = {
            winter: {
                bg: "radial-gradient(circle at 50% 30%, #0d1b2a 0%, #010811 70%, #000000 100%)",
                badge: "❄️ SHOV-SHUVLI QISH FASLI",
                color: "#60a5fa",
                glow: "rgba(96, 165, 250, 0.2)"
            },
            spring: {
                bg: "radial-gradient(circle at 50% 30%, #0f2416 0%, #020a05 70%, #000000 100%)",
                badge: "🌸 YAShIL LIFTING: BAHOR",
                color: "#34d399",
                glow: "rgba(52, 211, 153, 0.2)"
            },
            summer: {
                bg: "radial-gradient(circle at 50% 30%, #291a03 0%, #0d0801 70%, #000000 100%)",
                badge: "🔥 QAYNOQ VA G'AROYIB YOZ",
                color: "#fbbf24",
                glow: "rgba(251, 191, 36, 0.2)"
            },
            autumn: {
                bg: "radial-gradient(circle at 50% 30%, #241107 0%, #0a0401 70%, #000000 100%)",
                badge: "🍁 OLTIN REKORDLAR KUZI",
                color: "#f97316",
                glow: "rgba(249, 115, 22, 0.2)"
            }
        };

        // GWR Ma'lumot shablonlari (Har bir rekord o'zining shaxsiy mos rasmiga ega)
        const recordTemplates = [
            {
                title: "Eng katta shokoladli mo''jiza",
                desc: "Italiyalik mashhur ustalar tomonidan og'irligi 10180 kg bo'lgan ulkan shokoladli haykal yaratildi. Uni tayyorlashga bir oydan ortiq vaqt ketgan.",
                img: "https://images.unsplash.com/photo-1575037614876-c38a4d44f5b8?w=800&auto=format&fit=crop&q=80" // Haqiqiy shokolad rasmi
            },
            {
                title: "Muz ostida rekord darajadagi sho'ng'ish",
                desc: "Xorvatiyalik g'avvos Budimir Sobat suv ostida maxsus kislorodsiz roppa-rosa 24 daqiqa-yu 37 soniya qolib, inson imkoniyatlarini yangiladi.",
                img: "https://images.unsplash.com/photo-1478479405421-ce83c92fb3ba?w=800&auto=format&fit=crop&q=80" // Muz va sovuq suv osti g'avvosi
            },
            {
                title: "Kosmosda eng uzoq vaqt qolish",
                desc: "Kosmonavtlar ochiq koinot stantsiyasida jami bo'lib 878 kun yashab, sayyoradan tashqaridagi eng uzoq hayot rekordini o'rnatdilar.",
                img: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=800&auto=format&fit=crop&q=80" // Haqiqiy koinot va kosmonavt
            },
            {
                title: "Yer yuzidagi eng baland qum saroyi",
                desc: "Yevropa sohilida balandligi 21 metrlik ajoyib qum saroyi qurildi. Qurilishda minglab tonna maxsus qum ishlatilgan.",
                img: "https://images.unsplash.com/photo-1509114397022-ed747cca3f65?w=800&auto=format&fit=crop&q=80" // Ulkan qum saroyi
            },
            {
                title: "Eng tez yig'ilgan kubik rubik",
                desc: "Maks Park ismli yosh daho Rubik kubigini bor-yo'g'i 3 soniya-yu 13 soniya ichida to'liq yig'ib, aqldan ozdiruvchi rekord o'rnatdi.",
                img: "https://images.unsplash.com/photo-1591991731833-b4807cf7ef94?w=800&auto=format&fit=crop&q=80" // Rubik Kubigi
            }
        ];

        let currentMonth = 'yanvar';
        let currentUtterance = null;
        let subtitleInterval = null;

        // Dinamik zarrachalar generatori (Canvas)
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(type) {
                this.type = type;
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.vx = Math.random() * 1.5 - 0.75;
                this.vy = Math.random() * 2 + 1;
                this.size = Math.random() * 3 + 1;
                this.color = '#ffffff';
                this.angle = Math.random() * Math.PI * 2;
                
                if (type === 'spring') {
                    this.color = `rgba(244, 143, 177, ${Math.random() * 0.7 + 0.3})`;
                    this.size = Math.random() * 6 + 3;
                } else if (type === 'autumn') {
                    this.color = `rgba(${200 + Math.random() * 55}, ${100 + Math.random() * 50}, 20, ${Math.random() * 0.7 + 0.3})`;
                    this.size = Math.random() * 8 + 4;
                } else if (type === 'summer') {
                    this.color = `rgba(251, 191, 36, ${Math.random() * 0.4})`;
                    this.vy = Math.random() * 0.5 + 0.2;
                    this.size = Math.random() * 10 + 5;
                }
            }

            update() {
                this.y += this.vy;
                this.x += this.vx;
                this.angle += 0.01;

                if (this.y > canvas.height) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.beginPath();
                if (this.type === 'winter') {
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    ctx.fill();
                } else if (this.type === 'summer') {
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#fbbf24';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);
                    ctx.ellipse(0, 0, this.size, this.size / 2, 0, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.restore();
                }
            }
        }

        function initParticles(season) {
            particles = [];
            let count = season === 'winter' ? 80 : 40;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(season));
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // Rekordni qaytaruvchi yangilangan va aniq bog'langan algoritm
        function getRecord(monthId, dayNum) {
            const mIndex = months.findIndex(m => m.id === monthId);
            const seed = (mIndex * 31) + parseInt(dayNum);
            
            // Rekord andozasini tanlaymiz
            const template = recordTemplates[seed % recordTemplates.length];

            return {
                title: `${template.title} #${100 + seed}`,
                desc: template.desc + ` Ushbu ajoyib muvaffaqiyat rasmiy hakamlar tomonidan qayd etildi.`,
                img: template.img // Endi rasm har doim andozadagi aniq rasm bilan bir xil bo'ladi!
            };
        }

        // Oylarni vizual va faslga qarab yangilab chiqarish
        function renderMonths() {
            const container = document.getElementById('months-container');
            container.innerHTML = '';
            months.forEach(m => {
                const btn = document.createElement('button');
                btn.innerText = m.name;
                
                const style = seasonalStyles[m.season];
                btn.className = `px-4 py-2 rounded-xl glass-panel text-xs transition-all duration-300 font-semibold text-gray-400 hover:text-white neon-hover`;
                
                btn.style.setProperty('--accent-color', style.color);
                btn.style.setProperty('--accent-glow', style.glow);

                if (m.id === currentMonth) {
                    btn.style.background = style.color;
                    btn.style.color = '#000000';
                    btn.style.borderColor = style.color;
                    btn.style.boxShadow = `0 10px 25px ${style.glow}`;
                }

                btn.onclick = () => selectMonth(m.id);
                container.appendChild(btn);
            });
        }

        function selectMonth(monthId) {
            currentMonth = monthId;
            const monthObj = months.find(m => m.id === monthId);
            const style = seasonalStyles[monthObj.season];

            document.body.style.background = style.bg;
            document.getElementById('season-badge').innerText = style.badge;
            document.getElementById('season-badge').style.color = style.color;
            document.getElementById('selected-month-title').innerText = monthObj.name + " Oyi";

            initParticles(monthObj.season);
            renderMonths();
            renderDays();
        }

        // Kunlarni chiqarish
        function renderDays() {
            const grid = document.getElementById('days-grid');
            grid.innerHTML = '';
            const monthObj = months.find(m => m.id === currentMonth);
            const style = seasonalStyles[monthObj.season];
            
            for (let i = 1; i <= monthObj.days; i++) {
                const btn = document.createElement('button');
                btn.className = `group relative h-16 rounded-2xl glass-panel flex flex-col items-center justify-center transition-all duration-300 neon-hover cursor-pointer`;
                btn.style.setProperty('--accent-color', style.color);
                btn.style.setProperty('--accent-glow', style.glow);

                btn.innerHTML = `
                    <span class="absolute top-2 right-2 w-1.5 h-1.5 rounded-full" style="background-color: ${style.color}"></span>
                    <span class="text-[8px] text-gray-500 font-tech tracking-widest">KUN</span>
                    <span class="text-lg font-bold text-white group-hover:text-amber-400 transition">${i}</span>
                `;
                
                btn.onclick = () => openModal(currentMonth, i);
                grid.appendChild(btn);
            }
        }

        // --- RAQAMLARNI O'ZBEKCHA SO'ZGA O'GIRISH TIZIMI ---
        function raqamniMatngaOgir(num) {
            const birgacha = ["", "bir", "ikki", "uch", "to'rt", "besh", "olti", "yetti", "sakkiz", "to'qqiz"];
            const onlar = ["", "o'n", "yigirma", "o'ttiz", "qirq", "ellik", "oltmish", "yetmish", "sakkizon", "to'qson"];
            
            num = parseInt(num);
            if (num === 0) return "nol";
            
            let words = "";
            
            if (Math.floor(num / 1000000) > 0) {
                words += raqamniMatngaOgir(Math.floor(num / 1000000)) + " million ";
                num %= 1000000;
            }
            
            if (Math.floor(num / 1000) > 0) {
                words += raqamniMatngaOgir(Math.floor(num / 1000)) + " ming ";
                num %= 1000;
            }
            
            if (Math.floor(num / 100) > 0) {
                words += birgacha[Math.floor(num / 100)] + " yuz ";
                num %= 100;
            }
            
            if (num > 0) {
                if (num < 10) {
                    words += birgacha[num];
                } else {
                    words += onlar[Math.floor(num / 10)] + " " + birgacha[num % 10];
                }
            }
            
            return words.trim();
        }

        function matnniTayyorlash(text) {
            let yangiMatn = text.replace(/\d+/g, (match) => {
                return raqamniMatngaOgir(match);
            });
            
            yangiMatn = yangiMatn.replace(/o'/g, "o").replace(/g'/g, "g").replace(/sh/g, "sh").replace(/ch/g, "ch");
            return yangiMatn;
        }

        let currentWords = [];
        let activeWordIndex = -1;

        function openModal(month, day) {
            const monthObj = months.find(m => m.id === month);
            const data = getRecord(month, day);

            document.getElementById('modal-date').innerText = `${day}-${monthObj.name.toUpperCase()}`;
            document.getElementById('modal-title').innerText = data.title;
            document.getElementById('modal-img').src = data.img;

            const descText = data.desc;
            currentWords = descText.split(" ");
            const subtitleArea = document.getElementById('subtitles-area');
            subtitleArea.innerHTML = currentWords.map((word, idx) => `<span class="word-span" id="word-${idx}">${word}</span>`).join("");

            document.getElementById('record-modal').classList.remove('hidden');

            startSpeech(descText);
        }

        function startSpeech(text) {
            window.speechSynthesis.cancel();
            if (subtitleInterval) clearInterval(subtitleInterval);

            const eshitiladiganMatn = matnniTayyorlash(text);
            currentUtterance = new SpeechSynthesisUtterance(eshitiladiganMatn);
            
            currentUtterance.rate = 0.8; 
            
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.lang.startsWith('tr') || v.lang.startsWith('ru')) || voices[0];
            if (preferredVoice) currentUtterance.voice = preferredVoice;

            activeWordIndex = 0;
            const wordsCount = currentWords.length;
            const durationPerWord = (text.length * 75) / wordsCount; 

            subtitleInterval = setInterval(() => {
                if (activeWordIndex < wordsCount) {
                    if (activeWordIndex > 0) {
                        document.getElementById(`word-${activeWordIndex - 1}`).classList.remove('word-active');
                    }
                    const currentSpan = document.getElementById(`word-${activeWordIndex}`);
                    if (currentSpan) currentSpan.classList.add('word-active');
                    activeWordIndex++;
                } else {
                    clearInterval(subtitleInterval);
                }
            }, durationPerWord);

            window.speechSynthesis.speak(currentUtterance);
        }

        function toggleSpeech() {
            const spans = document.querySelectorAll('.word-span');
            const words = Array.from(spans).map(s => s.innerText);
            startSpeech(words.join(" "));
        }

        function closeModal() {
            window.speechSynthesis.cancel();
            if (subtitleInterval) clearInterval(subtitleInterval);
            document.getElementById('record-modal').classList.add('hidden');
        }

        document.getElementById('record-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        window.onload = () => {
            selectMonth('iyul');

            const todayData = getRecord('iyul', 15);
            document.getElementById('today-title').innerText = todayData.title;
            document.getElementById('today-desc').innerText = todayData.desc;
            document.getElementById('today-img').src = todayData.img;
        };
    </script>
</body>
</html>
